<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>AutoMatch — Nuevos</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="pink-bg">

  <header class="top-bar small">
    <div class="left-top">
      <div class="dots"><span></span><span></span><span></span></div>
      <h1 class="logo small-logo">AutoMatch</h1>
    </div>

    <div class="right-top">
      <input id="searchN" class="search" placeholder="Buscar modelo (ej. ford territory)" />
      <img src="img/AM.jpg" class="icon" alt="AM"/>
      <div class="cart-container">
        <img src="img/carrito.jpg" class="cart-icon" id="cartBtnN" alt="Carrito">
        <span class="cart-count" id="cartCountN">0</span>
      </div>
    </div>
  </header>

  <img src="img/bmw2020.jpg" class="background-car" alt="Fondo coche"/>

  <main class="page-container">
    <h2 class="page-title">NUEVOS</h2>

    <div class="info-and-filters">
      <article class="info-box improved-box">
        <img src="img/foco.jpg" class="small-icon" alt="Foco"/>
        <div>
          <p class="info-text">Buscamos la mejor opción para ti dependiendo de los parámetros y características que mejor se ajusten a tu decisión de compra.</p>
          <p class="help-link">Si necesitas ayuda escribe a <a href="mailto:automatchhelp@hotmail.com">automatchhelp@hotmail.com</a></p>
        </div>
      </article>

      <aside class="improved-filters">
        <h3 class="filters-title">Filtros</h3>
        <div class="filter-row">
          <label>Marca</label>
          <input id="brandFilterN" class="input" placeholder="Ej: Ford, Audi, BMW"/>
        </div>
        <div class="filter-row">
          <label>Año</label>
          <input id="yearFilterN" class="input" placeholder="Ej: 2024"/>
        </div>
        <div class="filter-row">
          <label>Tipo</label>
          <select id="typeFilterN" class="input">
            <option value="">Cualquiera</option>
            <option value="SUV">SUV</option>
            <option value="Sedán">Sedán</option>
            <option value="Deportivo">Deportivo</option>
          </select>
        </div>
        <div class="filter-row">
          <label>Precio máximo (MXN)</label>
          <input id="priceMaxN" type="number" class="input" placeholder="Ej: 1000000"/>
        </div>

        <button id="searchBtnN" class="btn-search">Buscar</button>
      </aside>
    </div>

    <section class="results-section">
      <h3 class="suggestions-title">Resultados</h3>
      <div id="resultsN" class="results-grid"></div>
    </section>

  </main>

  <a href="index.html" class="home-btn"><img src="img/home.jpg" alt="Home"/></a>

  <!-- overlay + cart modal reused -->
  <div id="overlay" class="overlay" style="display:none"></div>
  <div id="cartModal" class="cart-modal" aria-hidden="true">
    <button class="close-x" id="closeCartBtnN">&times;</button>
    <h3>Mi carrito</h3>
    <div class="cart-list-wrap"><ul id="cartItemsN"></ul></div>
    <div class="cart-footer">
      <div><strong>Total:</strong> <span id="cartTotalN">$0</span></div>
      <div class="cart-actions">
        <button id="reserveBtnN" class="action-btn">Apartar</button>
        <button id="quoteBtnN" class="action-btn outline">Cotizar</button>
      </div>
    </div>
  </div>

  <script src="search.js"></script>
</body>
</html>
