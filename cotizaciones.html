<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>AutoMatch — Cotizaciones</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="pink-bg">

  <header class="top-bar small">
    <div class="left-top">
      <div class="dots"><span></span><span></span><span></span></div>
      <h1 class="logo small-logo">AutoMatch</h1>
    </div>

    <div class="right-top">
      <input id="searchC" class="search" placeholder="Buscar modelo (ej. ford territory)" />
      <img src="https://tiendacloud01rodrimarlec.blob.core.windows.net/imagenesrodrigoml/AM.jpg" class="icon" alt="AM"/>
      <div class="cart-container">
        <img src="https://tiendacloud01rodrimarlec.blob.core.windows.net/imagenesrodrigoml/carrito.jpg" class="cart-icon" id="cartBtnC" alt="Carrito">
        <span class="cart-count" id="cartCountC">0</span>
      </div>
    </div>
  </header>

  <main class="page-container">
    <h2 class="page-title">COTIZACIONES</h2>

    <article class="info-box improved-box">
      <img src="https://tiendacloud01rodrimarlec.blob.core.windows.net/imagenesrodrigoml/foco.jpg" class="small-icon" alt="Foco"/>
      <div>
        <p class="info-text">Aquí puedes enviar los datos y los documentos necesarios para que te enviemos una cotización.</p>
        <p class="help-link">Si tienes dudas escribe a <a href="mailto:automatchhelp@hotmail.com">automatchhelp@hotmail.com</a></p>
      </div>
    </article>

    <section class="req-container">
      <h3 class="req-title">Requisitos</h3>

      <label>Nombre</label>
      <input id="cotName" class="input" type="text" placeholder="Tu nombre completo" />

      <label>Correo</label>
      <input id="cotEmail" class="input" type="email" placeholder="ejemplo@mail.com" />

      <label>Teléfono</label>
      <input id="cotPhone" class="input" type="text" placeholder="(55) 0000 0000" />

      <label>Automóvil (marca / modelo)</label>
      <input id="cotAuto" class="input" type="text" placeholder="Ej: Ford Territory" />

      <label>Documentos (sube aquí aunque se enviarán por mail manualmente)</label>
      <input id="cotFiles" class="input" type="file" accept=".pdf,.jpg,.jpeg,.png" multiple />

      <label>Comentarios</label>
      <textarea id="cotComments" class="input" rows="4" placeholder="Algo más que debamos saber..."></textarea>

      <button id="sendCot" class="btn-search">Enviar cotización</button>
    </section>
  </main>

  <a href="index.html" class="home-btn"><img src="https://tiendacloud01rodrimarlec.blob.core.windows.net/imagenesrodrigoml/home.jpg" alt="Home"/></a>

  <!-- overlay + cart modal -->
  <div id="overlay" class="overlay" style="display:none"></div>
  <div id="cartModal" class="cart-modal" aria-hidden="true">
    <button class="close-x" id="closeCartBtnC">&times;</button>
    <h3>Mi carrito</h3>
    <div class="cart-list-wrap"><ul id="cartItemsC"></ul></div>
    <div class="cart-footer">
      <div><strong>Total:</strong> <span id="cartTotalC">$0</span></div>
      <div class="cart-actions">
        <button id="reserveBtnC" class="action-btn">Apartar</button>
        <button id="quoteBtnC" class="action-btn outline">Cotizar</button>
      </div>
    </div>
  </div>

  <script src="search.js"></script>
</body>
</html>
